<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Invitation Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --beige      : #F5F0E8;
      --warm-white : #FDFBF7;
      --gold       : #C9A96E;
      --olive      : #5C5240;
      --text       : #3A3028;
      --text-light : #7A6E64;
      --border     : #E0D8CC;
      --green      : #4a7c59;
      --green-bg   : #eaf2e6;
      --red        : #9e4a4a;
      --red-bg     : #f5e8e8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--beige);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-script {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .login-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 36px;
    }

    .login-field { text-align: left; margin-bottom: 16px; }
    .login-field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--beige);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--gold); }

    .login-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: var(--olive);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover   { background: var(--gold); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-error {
      margin-top: 14px;
      font-size: 12px;
      color: var(--red);
      min-height: 18px;
    }

    /* ── Dashboard ── */
    #dashboard {
      display: none;
      padding: 40px 20px 80px;
    }

    .dash-header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    .dash-names {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: var(--gold);
      line-height: 1.1;
    }
    .dash-subtitle {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 6px;
    }
    .logout-btn {
      position: absolute;
      right: 0;
      top: 8px;
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 600px;
      margin: 0 auto 40px;
    }
    .stat-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 14px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 400;
      color: var(--olive);
      line-height: 1;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 8px;
    }
    .stat-card.attending { border-color: #b8d4b0; }
    .stat-card.attending .stat-num { color: var(--green); }
    .stat-card.declining { border-color: #d4b0b0; }
    .stat-card.declining .stat-num { color: var(--red); }

    /* ── Section title ── */
    .section-heading {
      max-width: 600px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-heading h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--olive);
    }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
    }
    .live-dot::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Response cards ── */
    .responses-wrap {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .response-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      align-items: start;
    }
    .response-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .response-badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .badge-yes { background: var(--green-bg); color: var(--green); }
    .badge-no  { background: var(--red-bg);   color: var(--red); }
    .badge-na  { background: var(--beige);     color: var(--text-light); }

    .response-message {
      grid-column: 1 / -1;
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.7;
      font-style: italic;
      border-left: 2px solid var(--gold);
      padding-left: 12px;
      margin-top: 4px;
    }
    .response-sig { grid-column: 1 / -1; margin-top: 4px; }
    .response-sig img {
      max-height: 55px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--beige);
      padding: 6px 10px;
    }
    .response-time {
      grid-column: 1 / -1;
      font-size: 10px;
      color: var(--text-light);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    #load-more-btn {
      display: none;
      margin: 24px auto 0;
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--olive);
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.2s;
    }
    #load-more-btn:hover { background: var(--warm-white); }

    .state-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-light);
      font-size: 13px;
    }

    .btn-export {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--warm-white);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--olive);
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-export:hover { background: var(--beige); }

    @media (max-width: 440px) {
      .stats-grid { grid-template-columns: 1fr; }
      .dash-names { font-size: 36px; }
      .logout-btn { position: static; margin-top: 12px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════
       LOGIN SCREEN
  ═══════════════════════════════ -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-script">Momenta</div>
      <h2>Your Invitation Dashboard</h2>

      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="login-btn" id="login-btn" onclick="doLogin()">View Our Responses</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>


  <!-- ══════════════════════════════
       COUPLE DASHBOARD
  ═══════════════════════════════ -->
  <div id="dashboard">

    <div class="dash-header">
      <div class="dash-names" id="couple-names">— &amp; —</div>
      <p class="dash-subtitle">Guest Responses</p>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card attending">
        <div class="stat-num" id="stat-yes">—</div>
        <div class="stat-label">Attending ✓</div>
      </div>
      <div class="stat-card declining">
        <div class="stat-num" id="stat-no">—</div>
        <div class="stat-label">Declining ✗</div>
      </div>
    </div>

    <div class="section-heading">
      <h3>Guest Messages</h3>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="live-dot">Live</span>
        <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
      </div>
    </div>

    <div class="responses-wrap" id="responses-list">
      <div class="state-msg">Loading your responses...</div>
    </div>

    <button id="load-more-btn" onclick="loadNextPage()">Load more</button>

  </div>


  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDlLSsLTWMGJZMCktTuCmnT9W5PWobZVVA",
  authDomain: "digital-invitations-c63dc.firebaseapp.com",
  projectId: "digital-invitations-c63dc",
  storageBucket: "digital-invitations-c63dc.firebasestorage.app",
  messagingSenderId: "823339122434",
  appId: "1:823339122434:web:4757dde339cd2b61c78c1b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ── Auth state ── */
auth.onAuthStateChanged(async user => {
  if (user) {
    // Load user profile to get their eventId
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (!userDoc.exists) {
      await auth.signOut();
      showError('No event linked to this account. Please contact us.');
      return;
    }
    const { eventId, coupleName } = userDoc.data();
    showDashboard(eventId, coupleName || '');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display    = 'none';
  }
});

/* ── Login ── */
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');

  clearError();
  btn.disabled    = true;
  btn.textContent = 'Signing in...';

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (err) {
    showError(friendlyError(err.code));
    btn.disabled    = false;
    btn.textContent = 'View Our Responses';
  }
}

/* ── Logout ── */
async function doLogout() {
  if (unsubscribe)      { unsubscribe();      unsubscribe      = null; }
  if (unsubscribeStats) { unsubscribeStats(); unsubscribeStats = null; }
  await auth.signOut();
}

function showError(msg)  { document.getElementById('login-error').textContent = msg; }
function clearError()    { document.getElementById('login-error').textContent = ''; }

/* Enter key support */
['login-email', 'login-password'].forEach(id => {
  document.getElementById(id)
    .addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

function friendlyError(code) {
  const map = {
    'auth/invalid-credential' : 'Incorrect email or password.',
    'auth/user-not-found'     : 'No account found with this email.',
    'auth/wrong-password'     : 'Incorrect password.',
    'auth/invalid-email'      : 'Please enter a valid email.',
    'auth/too-many-requests'  : 'Too many attempts. Please try again later.',
  };
  return map[code] || 'Sign-in failed. Please try again.';
}

/* ── Dashboard ── */
const PAGE_SIZE = 20;
let currentEventId   = null;
let lastVisible      = null;
let cachedResponses  = [];
let unsubscribe      = null;
let unsubscribeStats = null;

function showDashboard(eventId, coupleName) {
  currentEventId = eventId;

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display    = 'block';

  if (coupleName) {
    document.getElementById('couple-names').textContent = coupleName;
  }

  startListener();
  listenToStats();
}

function startListener() {
  const ref = db.collection('events').doc(currentEventId)
    .collection('responses').orderBy('timestamp', 'desc').limit(PAGE_SIZE);

  unsubscribe = ref.onSnapshot(snapshot => {
    if (snapshot.empty) {
      document.getElementById('responses-list').innerHTML =
        '<div class="state-msg">No responses yet — check back soon! 💌</div>';
      return;
    }
    lastVisible = snapshot.docs[snapshot.docs.length - 1];
    document.getElementById('load-more-btn').style.display =
      snapshot.docs.length === PAGE_SIZE ? 'block' : 'none';

    cachedResponses = snapshot.docs.map(doc => ({
      id: doc.id, ...doc.data(),
      timestamp: doc.data().timestamp?.toDate()
    }));
    renderResponses(cachedResponses, false);
  }, err => {
    document.getElementById('responses-list').innerHTML =
      `<div class="state-msg">Error loading responses: ${err.message}</div>`;
  });
}

function listenToStats() {
  const ref = db.collection('events').doc(currentEventId)
    .collection('stats').doc('summary');

  unsubscribeStats = ref.onSnapshot(snap => {
    const d = snap.exists ? snap.data() : {};
    document.getElementById('stat-total').textContent = d.total     || 0;
    document.getElementById('stat-yes').textContent   = d.attending || 0;
    document.getElementById('stat-no').textContent    = d.declining || 0;
  });
}

function loadNextPage() {
  if (!lastVisible) return;
  db.collection('events').doc(currentEventId).collection('responses')
    .orderBy('timestamp', 'desc').startAfter(lastVisible).limit(PAGE_SIZE).get()
    .then(snapshot => {
      if (snapshot.empty) {
        document.getElementById('load-more-btn').style.display = 'none';
        return;
      }
      lastVisible = snapshot.docs[snapshot.docs.length - 1];
      document.getElementById('load-more-btn').style.display =
        snapshot.docs.length === PAGE_SIZE ? 'block' : 'none';
      const newR = snapshot.docs.map(doc => ({
        id: doc.id, ...doc.data(),
        timestamp: doc.data().timestamp?.toDate()
      }));
      cachedResponses = [...cachedResponses, ...newR];
      renderResponses(newR, true);
    });
}

function renderResponses(responses, append) {
  const list = document.getElementById('responses-list');
  if (!append) list.innerHTML = '';

  responses.forEach(r => {
    const badgeClass = r.attending === 'yes' ? 'badge-yes'
                     : r.attending === 'no'  ? 'badge-no' : 'badge-na';
    const badgeText  = r.attending === 'yes' ? 'Attending ✓'
                     : r.attending === 'no'  ? 'Not Attending ✗' : 'No Answer';
    const timeStr    = r.timestamp
      ? r.timestamp.toLocaleDateString('en-GB', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        })
      : '—';

    const msgHtml = r.message
      ? `<div class="response-message">"${escHtml(r.message)}"</div>` : '';
    const sigHtml = r.signature
      ? `<div class="response-sig"><img src="${r.signature}" alt="Signature" /></div>` : '';

    const card = document.createElement('div');
    card.className = 'response-card';
    card.innerHTML = `
      <div class="response-name">${escHtml(r.name)}</div>
      <span class="response-badge ${badgeClass}">${badgeText}</span>
      ${msgHtml}${sigHtml}
      <div class="response-time">${timeStr}</div>`;
    list.appendChild(card);
  });
}

function exportExcel() {
  if (!cachedResponses.length) { alert('No responses loaded yet.'); return; }
  const rows = cachedResponses.map(r => ({
    'Name'         : r.name      || '',
    'Attending'    : r.attending || '',
    'Message'      : r.message   || '',
    'Has Signature': r.signature ? 'Yes' : 'No',
    'Language'     : r.lang      || '',
    'Timestamp'    : r.timestamp ? r.timestamp.toISOString() : ''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:25},{wch:15},{wch:40},{wch:15},{wch:10},{wch:25}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'RSVP Responses');
  XLSX.writeFile(wb, `rsvp-${currentEventId}.xlsx`);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
